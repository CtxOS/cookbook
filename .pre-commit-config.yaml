repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=88, --extend-ignore=E203,W503]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]
        args: [--ignore-missing-imports]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        args: [tests/, --tb=short]

      - id: cookbook-validation
        name: cookbook-validation
        entry: python -c "
import sys
from pathlib import Path
from ctxcook.parser import load_recipe
from ctxcook.validator import validate

cookbooks_dir = Path('cookbooks')
yaml_files = list(cookbooks_dir.glob('**/*.yaml')) + list(cookbooks_dir.glob('**/*.yml'))

failed_files = []
for yaml_file in yaml_files:
    try:
        recipe = load_recipe(str(yaml_file))
        validate(recipe)
        print(f'✅ {yaml_file}')
    except Exception as e:
        print(f'❌ {yaml_file}: {e}')
        failed_files.append(str(yaml_file))

if failed_files:
    sys.exit(1)
"
        language: system
        files: '^cookbooks/.*\.ya?ml$'
        pass_filenames: false
