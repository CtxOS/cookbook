name: time_series_forecasting

model:
  base: pytorch/tft
  type: temporal_fusion_transformer
  hidden_size: 64
  attention_head_size: 4
  dropout: 0.1
  learning_rate: 0.001

dataset:
  source: local
  path: ./time_series_data.csv
  target_column: target
  time_column: timestamp
  feature_columns: [feature1, feature2, feature3]

preprocessing:
  scaling: standard
  fill_missing: forward_fill
  outlier_detection: iqr
  train_split: 0.8
  val_split: 0.1

training:
  batch_size: 32
  epochs: 100
  early_stopping: true
  patience: 10
  loss_function: mse

forecasting:
  horizon: 24
  quantiles: [0.1, 0.5, 0.9]
  backtesting: true
  backtest_windows: 5
